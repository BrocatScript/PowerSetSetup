name: Auto Update Stats Dashboard

on:
  schedule:
    - cron: '0 */2 * * *' # Запуск каждые 2 часа (время по UTC)
  workflow_dispatch: # Позволяет запускать скрипт вручную кнопкой на GitHub

jobs:
  run-stats-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests matplotlib

    - name: Run Stats Script
      run: python Stats_github_web

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add stats_database.json stats_history.txt *.png
        # Проверяем, изменилось ли что-то, чтобы не делать пустые коммиты
        git diff-index --quiet HEAD || (git commit -m "Auto-update stats and dashboards" && git push)
